<script type="module">
    import {
        pythonURI,
        fetchOptions,
    } from "/personal_flocker_frontend/assets/js/api/config.js";

    const loginLink = document.getElementById("signup-login");
    const profileLink = document.getElementById("profile");

    document.addEventListener("DOMContentLoaded", () => {
        getCredentials() // Call the function to get credentials
            .then((data) => {
                if (data) {
                    //IF DATA THEN THE USER IS AUTHENTICATED/LOGGED IN
                    console.log("LOGGED IN");
                    loginLink.hidden = true;
                    profileLink.hidden = false;
                } else {
                    //USER IS NOT AUTHENTICATED/LOGGED IN
                }
            })
            .catch((err) => {
                // General error handler
                console.error("Error fetching credentials: ", err);
                // Handle any errors that occurred during getCredentials
            });
    });
    function getCredentials() {
        const URL = pythonURI + "/api/user";
        return fetch(URL, fetchOptions)
            .then((response) => {
                // API response handler
                if (response.status !== 200) {
                    console.error("HTTP status code: " + response.status);
                    return null; // prepares to stop the chain by returning null.
                }
                return response.json(); // plans to continue the chain with the data.
            })
            .then((data) => {
                // Data handler from the previous promise
                if (data === null) return null; // stops the chain, returns null.
                return data; // returns data to caller
            })
            .catch((err) => {
                // General error handler
                console.error("Fetch error: ", err);
                return null;
            });
    }
</script>

<script type="module">
    import { pythonURI, fetchOptions } from '/personal_flocker_frontend/assets/js/api/config.js';

    // URLs to fetch profile links, user data, and commits
    const postApiUrl = `${pythonURI}/api/posts`;

    async function fetchData() {
        try {
            // Define the fetch requests
            const postApiRequest = fetch(postApiUrl, fetchOptions);

            // Run all fetch requests concurrently
            const [postApiResponse] = await Promise.all([
                postApiRequest
            ]);

            // Check for errors in the responses
            if (!postApiResponse.ok) {
                throw new Error('Failed to fetch post API links: ' + postApiResponse.statusText);
            }

            // Parse the JSON data
            const postData = await postApiResponse.json();

            // Extract commits count
            const postCount = postData.length || 0;

            // Update the HTML elements with the data
            document.getElementById('count').innerHTML = `<h2>Count ${postCount}</h2>`;

            // Get the details div
            const detailsDiv = document.getElementById('details');

            // Iterate over the postData and create HTML elements for each item
            postData.forEach(postItem => {
                const postElement = document.createElement('div');
                postElement.className = 'post-item';
                postElement.innerHTML = `
                    <h3>${postItem.title}</h3>
                    <p><strong>Channel:</strong> ${postItem.channel_name}</p>
                    <p><strong>User:</strong> ${postItem.user_name}</p>
                    <p>${postItem.comment}</p>
                `;
                detailsDiv.appendChild(postElement);
            });

        } catch (error) {
            console.error('Error fetching data:', error);
        }
    }

    // Call the fetchData function to initiate the requests
    fetchData();
</script>

<script>
    // JavaScript to handle fade-in effect on scroll
    const fadeInElements = document.querySelectorAll(".fade-in");

    const handleScroll = () => {
        fadeInElements.forEach((el) => {
            const rect = el.getBoundingClientRect();
            if (rect.top < window.innerHeight * 0.9 && rect.bottom > 0) {
                el.classList.add("visible");
            } else {
                el.classList.remove("visible");
            }
        });
    };

    window.addEventListener("scroll", handleScroll);
    window.addEventListener("load", handleScroll); // Trigger on page load
</script>
